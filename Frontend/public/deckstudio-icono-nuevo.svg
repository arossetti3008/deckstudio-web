<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Dark Violet Gradient -->
    <linearGradient id="gradLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b0764;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6b21a8;stop-opacity:1" />
    </linearGradient>
    
    <!-- Bright Violet Gradient -->
    <linearGradient id="gradCenter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#581c87;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    
    <!-- Blue Gradient -->
    <linearGradient id="gradRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3730a3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>

    <!-- 4 Pointed Star -->
    <path id="star" d="M 50 15 Q 50 50 15 50 Q 50 50 50 85 Q 50 50 85 50 Q 50 50 50 15 Z" fill="#ffffff" opacity="0.9"/>
  </defs>

  <g transform="translate(50, 52)">
    <!-- Card Left -->
    <g transform="rotate(-25)">
      <rect x="-16" y="-28" width="32" height="56" rx="4" fill="url(#gradLeft)" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2"/>
    </g>
    
    <!-- Card Center -->
    <g transform="rotate(0)">
      <rect x="-16" y="-28" width="32" height="56" rx="4" fill="url(#gradCenter)" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2" />
    </g>
    
    <!-- Card Right -->
    <g transform="rotate(25)">
      <rect x="-16" y="-28" width="32" height="56" rx="4" fill="url(#gradRight)" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2" />
    </g>
    
    <!-- Star -->
    <g transform="scale(0.35) translate(-50, -50)">
      <use href="#star" />
    </g>
  </g>
</svg>

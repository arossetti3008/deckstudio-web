<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" fill="none">
  <defs>
    <linearGradient id="chefGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Gorro de Chef (Parte Superior) -->
  <path d="M30,40 C24,38 22,28 32,24 C34,16 45,14 50,18 C55,14 66,16 68,24 C78,28 76,38 70,40 Z" 
        stroke="url(#chefGrad)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Banda inferior del gorro -->
  <path d="M30,40 L30,45 L70,45 L70,40 Z" 
        stroke="url(#chefGrad)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Hoja tipo Receta (Parte Inferior) -->
  <rect x="34" y="52" width="32" height="34" rx="3" 
        stroke="url(#chefGrad)" stroke-width="2.5" stroke-linejoin="round"/>
        
  <!-- Líneas de la receta (lista de ingredientes) -->
  <!-- Checkbox / viñetas circulares -->
  <circle cx="40" cy="61" r="1.2" fill="#a78bfa"/>
  <circle cx="40" cy="69" r="1.2" fill="#a78bfa"/>
  <circle cx="40" cy="77" r="1.2" fill="#a78bfa"/>
  
  <!-- Líneas de texto -->
  <line x1="46" y1="61" x2="60" y2="61" stroke="url(#chefGrad)" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="46" y1="69" x2="57" y2="69" stroke="url(#chefGrad)" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="46" y1="77" x2="54" y2="77" stroke="url(#chefGrad)" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
</svg>
